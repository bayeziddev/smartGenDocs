name: SmartGen Docs CI & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"

jobs:
  validate:
    name: Validate Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install .

      - name: Validate Configuration
        run: |
          echo "Checking SmartGen configuration..."
          if [ -f smartgen.yml ] || [ -f SmartGen.yml ]; then
            echo "✔ Configuration file found"
          else
            echo "⚠ Configuration file not found."
          fi

      - name: Validate Documentation Folder
        run: |
          if [ ! -d docs ]; then
            echo "docs folder not found"
            exit 1
          fi
          echo "Documentation folder verified."

      - name: Validate Markdown Files
        run: |
          COUNT=$(find docs -name "*.md" | wc -l)
          echo "Markdown files found: $COUNT"
          if [ "$COUNT" -eq "0" ]; then
            echo "No documentation files found in docs/."
            exit 1
          fi

  build:
    name: Build SmartGen Docs
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install .

      - name: Build Documentation
        run: |
          echo "Building SmartGen Docs..."
          smartgen-docs build

      - name: Verify Build & Prevent Jekyll Overrides
        run: |
          if [ ! -d site ]; then
            echo "Build failed: 'site' directory not generated."
            exit 1
          fi
          # Touch .nojekyll to ensure GitHub Pages serves underscore assets properly
          touch site/.nojekyll
          echo "Build successful. Added .nojekyll flag."

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  summary:
    name: Build Summary
    if: always()
    needs:
      - validate
      - build
      - deploy

    runs-on: ubuntu-latest

    steps:
      - name: Workflow Summary
        run: |
          echo "# SmartGen Docs Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Repository: $GITHUB_REPOSITORY" >> $GITHUB_STEP_SUMMARY
          echo "Branch: $GITHUB_REF_NAME" >> $GITHUB_STEP_SUMMARY
          echo "Commit: $GITHUB_SHA" >> $GITHUB_STEP_SUMMARY
          echo "Triggered by: $GITHUB_ACTOR" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Status: Workflow execution finished." >> $GITHUB_STEP_SUMMARY