name: SmartGen Docs CI & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: smartgen-pages
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  validate:

    name: Validate Project

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          pip install .

      - name: Validate Configuration
        run: |
          echo "Checking SmartGen configuration..."

          if [ -f smartgen.yml ]; then
            echo "✔ smartgen.yml found"
          else
            echo "⚠ smartgen.yml not found."
          fi

      - name: Validate Documentation Folder
        run: |

          if [ ! -d docs ]; then
            echo "docs folder not found"
            exit 1
          fi

          echo "Documentation folder verified."

      - name: Validate Themes
        run: |

          if [ -d smartgen_docs/themes ]; then
            echo "Theme directory found."
          else
            echo "No themes found."
          fi

      - name: Validate Markdown Files
        run: |

          COUNT=$(find docs -name "*.md" | wc -l)

          echo "Markdown files: $COUNT"

          if [ "$COUNT" -eq "0" ]; then
            echo "No documentation found."
            exit 1
          fi

      - name: Show Project Information
        run: |
          echo "Repository : $GITHUB_REPOSITORY"
          echo "Branch     : $GITHUB_REF_NAME"
          echo "Commit     : $GITHUB_SHA"
          echo "Actor      : $GITHUB_ACTOR"

  build:

    name: Build SmartGen Docs

    runs-on: ubuntu-latest

    needs: validate

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          pip install .

      - name: Build Documentation
        run: |

          echo "Building SmartGen Docs..."

          smartgen-docs build

      - name: Verify Build
        run: |

          if [ ! -d site ]; then
            echo "Build failed."
            exit 1
          fi

          echo "Build successful."

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:

    name: Deploy GitHub Pages

    if: github.ref == 'refs/heads/main'

    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  summary:

    name: Build Summary

    if: always()

    needs:
      - validate
      - build
      - deploy

    runs-on: ubuntu-latest

    steps:

      - name: Workflow Summary
        run: |

          echo "# SmartGen Docs Build Summary" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY

          echo "Repository: $GITHUB_REPOSITORY" >> $GITHUB_STEP_SUMMARY

          echo "Branch: $GITHUB_REF_NAME" >> $GITHUB_STEP_SUMMARY

          echo "Commit: $GITHUB_SHA" >> $GITHUB_STEP_SUMMARY

          echo "Triggered by: $GITHUB_ACTOR" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY

          echo "Validation: Completed" >> $GITHUB_STEP_SUMMARY

          echo "Build: Completed" >> $GITHUB_STEP_SUMMARY

          echo "Deployment: Completed (main branch only)" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY

          echo "SmartGen Docs CI finished successfully." >> $GITHUB_STEP_SUMMARY
