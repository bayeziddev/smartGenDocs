name: Deploy SmartGen Docs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install markdown2 Jinja2 PyYAML click watchdog

    - name: Install SmartGen Docs (editable mode for local project)
      run: pip install -e .
      working-directory: smartGenDocs

    - name: Initialize and Build SmartGen Docs
      run: |
        smartgen-docs init
        smartgen-docs build
      working-directory: smartGenDocs

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: smartGenDocs/site
        # Keep the existing .nojekyll file to prevent GitHub Pages from processing with Jekyll
        keep_files: true
