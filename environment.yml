name: smartgen-docs-env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - pip:
    # Core Dependencies
    - click>=8.1.8
    - Jinja2>=3.1.6
    - markdown2>=2.5.4
    - PyYAML>=6.0.2
    - watchdog>=6.0.0
    - Pygments>=2.19.2
    
    # Template & HTML Processing
    - MarkupSafe>=3.0.2
    
    # Optional Docs Features
    - python-frontmatter>=1.1.0
    - beautifulsoup4>=4.13.4
    
    # Search & Images
    - whoosh>=2.7.4
    - Pillow>=11.3.0
    
    # HTTP & API
    - requests>=2.32.4
    - fastapi>=0.116.1
    - uvicorn>=0.35.0
    
    # Utilities
    - python-slugify>=8.0.4
    - typing-extensions>=4.15.0